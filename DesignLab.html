  <div class="hero-section project-page">
    <h1 class="h1-centerated">Building Design Lab Pitchdeck</h1>
  </div>

  <div class="wrapper project_page_content_width">
    <img src="./Adil Portfolio/design-lab/Pitch deck design lab.png" alt="Building Design Lab Pitchdeck">
  </div>

  <!-- DESIGN-LAB-CHAT-START — remove this block + ai scripts to revert -->
  <div class="proj-chat-float" data-project-chat="design-lab">
    <div class="proj-chat-panel" id="projChatPanel" role="dialog" aria-hidden="true" aria-label="Ask about Design Lab">
      <div class="proj-chat-panel-head">
        <span class="proj-chat-panel-title">Ask about Design Lab</span>
        <button type="button" class="proj-chat-panel-close" aria-label="Close chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
          </svg>
        </button>
      </div>
      <div class="proj-chat-log" role="log" aria-live="polite"></div>
      <div class="proj-chat-chips">
        <button type="button" class="proj-chat-chip" data-q="What was the plan of action?">Plan of action</button>
        <button type="button" class="proj-chat-chip" data-q="How were roles and responsibilities structured?">Roles</button>
        <button type="button" class="proj-chat-chip" data-q="Tell me about the onboarding approach">Onboarding</button>
        <button type="button" class="proj-chat-chip" data-q="How did research shape the vision?">Research</button>
      </div>
      <form class="proj-chat-form" autocomplete="off">
        <input class="proj-chat-input" type="text" name="q" placeholder="Ask anything…" required>
        <button class="proj-chat-send" type="submit" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="m5 12 7-7 7 7"/><path d="M12 19V5"/>
          </svg>
        </button>
      </form>
    </div>
